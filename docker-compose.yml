services:
  postgres:
    image: postgres:16-alpine
    container_name: terratrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: terratrace
      POSTGRES_USER: terratrace
      POSTGRES_PASSWORD: terratrace
    ports:
      - "5432:5432"
    volumes:
      - terratrace-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terratrace -d terratrace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  terratrace-postgres-data:
